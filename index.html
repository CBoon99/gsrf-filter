<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Temporarily Offline for Review</title>
  <link rel="canonical" href="https://zeroovershoot.com/">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --text: #0f172a;
      --muted: #64748b;
      --bg: #f8fafc;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    main { max-width: 560px; width: 100%; text-align: center; }
    h1 {
      font-size: clamp(28px, 4vw, 34px);
      font-weight: 600;
      letter-spacing: -0.5px;
      margin: 0 0 24px;
    }
    p {
      font-size: 16px;
      line-height: 1.7;
      color: var(--muted);
      margin: 0 0 16px;
    }
    .contact { margin-top: 32px; font-size: 14px; }
    .contact a { color: var(--accent); text-decoration: none; }
    .contact a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <h1>Temporarily Offline for Review</h1>
    <p>We are currently updating the site to ensure all public technical statements precisely match the latest audited evidence.</p>
    <p>Thank you for your patience.</p>
    <p class="contact">For enquiries, contact: <a href="mailto:info@boonmind.io">info@boonmind.io</a></p>
  </main>
</body>
</html>
